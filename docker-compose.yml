services:
  fastapi:
    build:
      context: .
      dockerfile: app/Dockerfile
    # DB 자격증명(JWT 등)은 .env 에서, 컨테이너 네트워크용 접속 정보는 아래 environment 로 덮어쓴다.
    env_file:
      - .env
    environment:
      # 컨테이너 내부에서는 localhost 가 아니라 mysql 서비스명으로 접속한다.
      DB_HOST: mysql
      DB_PORT: "3306"
    ports:
      - "8000:8000"
    volumes:
      # 개발 편의를 위한 소스 마운트 (uvicorn --reload 반영). .venv(/code/.venv)는 보존된다.
      - ./app:/code/app
      - ./worker:/code/worker
      - ./alembic:/code/alembic
      - ./static:/code/static
      # 업로드된 X-ray 이미지 영속화 (추론 시 이 경로에서 파일을 읽는다)
      - media_volume:/code/media
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/healthcheck || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    volumes:
      - mysql_volume:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 20s
      retries: 10

  adminer:
    image: adminer:5
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy


volumes:
  mysql_volume:
  media_volume:
